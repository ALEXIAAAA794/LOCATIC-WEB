name: CI

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore Locatic.sln

      - name: Build
        run: dotnet build Locatic.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test Locatic.sln --configuration Release --no-build

      - name: Publish
        run: dotnet publish Locatic.Web/Locatic.Web.csproj -c Release -o publish --no-build

      - name: Build Docker image
        run: docker build -t locatic-web:latest .