apiVersion: apps/v1
kind: Deployment
metadata:
  name: locatic-web
  namespace: locatic

spec:
  replicas: 1

  selector:
    matchLabels:
      app: locatic-web

  template:
    metadata:
      labels:
        app: locatic-web

    spec:
      containers:
      - name: locatic-web
        image: locatic-web:test1
        imagePullPolicy: Never

        ports:
        - containerPort: 8080

        env:
        - name: ASPNETCORE_URLS
          value: "http://+:8080"

        volumeMounts:
        - name: sqlite-storage
          mountPath: /data

        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10

        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 20

      volumes:
      - name: sqlite-storage
        persistentVolumeClaim:
          claimName: sqlite-pvc